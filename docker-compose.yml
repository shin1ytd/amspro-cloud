# ============================================================
# AmsPRO ローカル開発用 docker-compose
# 使い方:
#   docker compose up -d     ← 起動
#   docker compose down      ← 停止
#   docker compose logs -f   ← ログ確認
# ============================================================
version: '3.8'

services:
  # PostgreSQL
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: amspro
      POSTGRES_USER: amspro
      POSTGRES_PASSWORD: amspro_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amspro"]
      interval: 5s
      timeout: 3s
      retries: 10

  # AmsPROアプリ
  app:
    build: .
    ports:
      - "3000:8080"
    environment:
      PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: amspro
      DB_USER: amspro
      DB_PASSWORD: amspro_dev
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
